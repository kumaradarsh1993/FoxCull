<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>FoxCull icon options</title>
    <style>
      body { margin: 0; font: 15px/1.45 system-ui, -apple-system, Segoe UI, sans-serif; background: #f4f1ea; color: #172124; }
      main { max-width: 1040px; margin: 0 auto; padding: 48px 24px; }
      h1 { margin: 0 0 8px; font-size: 34px; }
      p { margin: 0 0 28px; color: #5c615d; }
      .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(210px, 1fr)); gap: 18px; }
      article { background: #fff; border: 1px solid #ddd7ca; border-radius: 18px; padding: 18px; box-shadow: 0 16px 38px rgba(28, 25, 18, 0.08); }
      img { width: 100%; aspect-ratio: 1; display: block; border-radius: 22px; background: #d9d4c8; }
      h2 { margin: 14px 0 4px; font-size: 16px; }
      span { color: #73766f; font-size: 13px; }
    </style>
  </head>
  <body>
    <main>
      <h1>FoxCull Icon Options</h1>
      <p>Modern minimalist directions without fox, skull, pig, or Codex references.</p>
      <div class="grid">
        <article><img src="../assets/icon-options/01-frame-timeline.svg" alt="Frame timeline icon option" /><h2>01 Frame Timeline</h2><span>Applied as the current app icon.</span></article>
        <article><img src="../assets/icon-options/02-aperture-stack.svg" alt="Aperture stack icon option" /><h2>02 Aperture Stack</h2><span>Warm, photographic, softer.</span></article>
        <article><img src="../assets/icon-options/03-prism-cut.svg" alt="Prism cut icon option" /><h2>03 Prism Cut</h2><span>Sharper edit/crop identity.</span></article>
        <article><img src="../assets/icon-options/04-minimal-lane.svg" alt="Minimal lane icon option" /><h2>04 Minimal Lane</h2><span>Quiet timeline abstraction.</span></article>
      </div>
    </main>
  </body>
</html>
