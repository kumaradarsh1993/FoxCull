# Cross-platform release builds for FoxCull.
#
# Triggers:
#   - push to a tag matching v* (e.g. `git tag v0.1.0-nightly.1 && git push --tags`)
#   - manual run from the Actions tab with the `tag` input — creates that tag
#     at the dispatched commit and releases it (the path remote agent sessions
#     use, since their git proxy can't push tags)
#
# Pipeline (3-job split avoids the tauri-action draft race when run from a matrix):
#   1. create-release   drafts a GitHub release for the tag (once)
#   2. build (matrix)   builds Windows / macOS-ARM / Linux, uploads into the draft
#   3. publish-release  flips draft -> published once all builds succeed
#
# Channels (tag-name driven):
#   - Stable:  v1.2.3            -> published as Latest, prerelease=false
#   - Nightly: v1.2.3-nightly.1  -> Pre-release, NOT Latest
#
# macOS Intel (macos-13) intentionally omitted (unreliable GitHub runners).

name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: >-
          Tag to release, e.g. v1.2.0-nightly.4. If it doesn't exist yet it is
          created at the dispatched commit (remote agent sessions can't push
          tags through the git proxy — this input is their release path).
        required: false
        type: string

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-22.04
    outputs:
      release_id: ${{ steps.create.outputs.result }}
      is_prerelease: ${{ steps.create.outputs.is_prerelease }}
      tag_name: ${{ steps.create.outputs.tag_name }}
    steps:
      - uses: actions/checkout@v4
      - name: Create draft release
        id: create
        uses: actions/github-script@v7
        with:
          script: |
            // Tag resolution: a v* tag push carries the tag in the ref; a
            // manual dispatch takes it from the `tag` input and CREATES the
            // tag at the dispatched commit if it doesn't exist yet (refs made
            // with the Actions token don't re-trigger this workflow, so no
            // double run).
            let tag;
            const input = ((context.payload.inputs || {}).tag || '').trim();
            if (context.ref.startsWith('refs/tags/')) {
              tag = context.ref.replace('refs/tags/', '');
            } else if (input) {
              if (!/^v\d/.test(input)) {
                core.setFailed(`Tag input must look like v1.2.3[-nightly.N], got "${input}"`);
                return;
              }
              tag = input;
              try {
                await github.rest.git.createRef({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  ref: `refs/tags/${tag}`,
                  sha: context.sha,
                });
                core.info(`Created tag ${tag} at ${context.sha}`);
              } catch (e) {
                if (e.status === 422) core.info(`Tag ${tag} already exists — releasing it as-is`);
                else throw e;
              }
            } else {
              core.setFailed('Run from a v* tag push, or fill in the tag input.');
              return;
            }
            core.setOutput('tag_name', tag);
            const isPrerelease = tag.startsWith('nightly-') || /-(nightly|pre|rc|alpha|beta)\b/.test(tag);
            core.setOutput('is_prerelease', String(isPrerelease));
            const channelHeader = isPrerelease
              ? '> Pre-release / nightly build. Not the latest stable.\n\n'
              : '';
            // Human-written notes for THIS build: RELEASE_NOTES.md at the repo
            // root (committed alongside the tagged work) leads the body, so the
            // release page says what actually changed, not just how to install.
            const fs = require('fs');
            let notes = '';
            try { notes = fs.readFileSync('RELEASE_NOTES.md', 'utf8').trim() + '\n\n---\n\n'; } catch {}
            const body = channelHeader + notes + [
              `Built from commit ${context.sha}.`,
              '',
              '**Pick your installer:**',
              '- **Windows:** installer `.exe` or `foxcull_*_x64_portable.zip` (no-install, run off an SSD)',
              '- **macOS Apple Silicon (M1/M2/M3/M4):** `.dmg`',
              '- **Linux:** `*.AppImage` (portable) or `*.deb`',
              '',
              '## First-time install',
              '**Windows:** click through SmartScreen ("More info" -> "Run anyway") — not code-signed yet.',
              '**macOS:** not notarized — right-click the app -> Open, or run',
              '`xattr -dr com.apple.quarantine "/Applications/FoxCull.app"`.',
            ].join('\n');
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `FoxCull ${tag}`,
              body,
              draft: true,
              prerelease: isPrerelease,
            });
            return data.id;
          result-encoding: string

  build:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'   # Apple Silicon (arm64)
            args: '--target aarch64-apple-darwin'
          - platform: 'ubuntu-22.04'
            args: ''
          - platform: 'windows-latest'
            args: ''
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin' || '' }}
      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
      - name: Install Linux deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - name: Install npm deps
        run: npm ci
      # Bundle a static ffmpeg as the Tauri sidecar (video posters + trim). Each
      # runner only stages its own target's binary, named with the target triple.
      # Sources: BtbN static builds (Win/Linux, on GitHub) + martin-riedl (macOS
      # arm64). HEVC decode is built into all of them (Osmo Pocket 3 support).
      - name: Stage ffmpeg sidecar (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force src-tauri\binaries | Out-Null
          Invoke-WebRequest -Uri "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip" -OutFile ffmpeg.zip
          Expand-Archive ffmpeg.zip -DestinationPath ff -Force
          $bin = Get-ChildItem ff -Recurse -Filter ffmpeg.exe | Select-Object -First 1
          Copy-Item $bin.FullName "src-tauri\binaries\ffmpeg-x86_64-pc-windows-msvc.exe"
          Get-ChildItem src-tauri\binaries
      - name: Stage ffmpeg sidecar (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        shell: bash
        run: |
          mkdir -p src-tauri/binaries
          curl -L -o ffmpeg.tar.xz "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-linux64-gpl.tar.xz"
          tar xf ffmpeg.tar.xz
          BIN=$(find . -path '*/bin/ffmpeg' -type f | head -1)
          cp "$BIN" src-tauri/binaries/ffmpeg-x86_64-unknown-linux-gnu
          chmod +x src-tauri/binaries/ffmpeg-x86_64-unknown-linux-gnu
          ls -la src-tauri/binaries
      - name: Stage ffmpeg sidecar (macOS arm64)
        if: matrix.platform == 'macos-latest'
        shell: bash
        run: |
          mkdir -p src-tauri/binaries
          curl -L -o ffmpeg.zip "https://ffmpeg.martin-riedl.de/redirect/latest/macos/arm64/release/ffmpeg.zip"
          unzip -o ffmpeg.zip -d ff
          BIN=$(find ff -name ffmpeg -type f | head -1)
          cp "$BIN" src-tauri/binaries/ffmpeg-aarch64-apple-darwin
          chmod +x src-tauri/binaries/ffmpeg-aarch64-apple-darwin
          ls -la src-tauri/binaries
      # Stamp the build's version from the git tag so every installer/dmg is
      # named AND embedded as e.g. FoxCull_0.6.0_* instead of the
      # committed base version in the config — no more ambiguous downloads. The
      # committed config keeps the current stable base; this only rewrites it in CI.
      # The tag comes from create-release (real tag push OR the dispatch input),
      # so it can never be "main".
      - name: Stamp version from tag
        if: needs.create-release.outputs.tag_name != ''
        shell: bash
        env:
          RELEASE_TAG: ${{ needs.create-release.outputs.tag_name }}
        run: |
          VER="${RELEASE_TAG#v}"
          node -e "const fs=require('fs');const p='src-tauri/tauri.conf.json';const c=JSON.parse(fs.readFileSync(p,'utf8'));c.version='${VER}';fs.writeFileSync(p,JSON.stringify(c,null,2)+'\n');console.log('Stamped tauri.conf.json =>',c.version);"
          # Cargo.toml must carry the same version: the runtime window title is
          # built from CARGO_PKG_VERSION at compile time, so stamping only the
          # Tauri config left tagged builds titled with the stale committed
          # version (e.g. a v1.1.0-nightly.1 build showing "FoxCull v1.0.1").
          perl -0pi -e "s/^version = \"[^\"]+\"/version = \"${VER}\"/m" src-tauri/Cargo.toml
          grep '^version' src-tauri/Cargo.toml
      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: ${{ matrix.args }}
      # A successful compile is not enough on Windows. A local GNU build once
      # produced an installer that immediately failed with
      # "WebView2Loader.dll was not found", and the portable package omitted
      # ffmpeg. Launch the exact release executable and require its sidecar
      # before allowing either Windows artifact to be published.
      - name: Verify Windows runtime
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: pwsh -NoProfile -ExecutionPolicy Bypass -File ./scripts/verify-windows-runtime.ps1 -ReleaseDir "src-tauri/target/release"
      # Standalone, no-installer build for running off an SSD / USB stick. The
      # bare exe + a sibling `foxcull-data` folder = fully portable (the app
      # roots its catalog/cache/settings in that folder).
      - name: Package portable (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $ver = "${{ needs.create-release.outputs.tag_name }}" -replace '^v',''
          $dir = "foxcull-portable"
          New-Item -ItemType Directory -Force $dir | Out-Null
          Copy-Item src-tauri/target/release/foxcull.exe "$dir/foxcull.exe"
          Copy-Item src-tauri/target/release/ffmpeg.exe "$dir/ffmpeg.exe"
          New-Item -ItemType Directory -Force "$dir/foxcull-data" | Out-Null
          "Keep this folder next to foxcull.exe. FoxCull stores its catalog, thumbnail cache and settings here, so the whole app is portable across machines." | Out-File -Encoding utf8 "$dir/foxcull-data/READ-ME.txt"
          Compress-Archive -Path "$dir/*" -DestinationPath "foxcull_${ver}_x64_portable.zip" -Force
          $verify = Join-Path $env:RUNNER_TEMP "foxcull-portable-verify"
          Expand-Archive "foxcull_${ver}_x64_portable.zip" -DestinationPath $verify -Force
          if (-not (Test-Path "$verify/foxcull.exe") -or -not (Test-Path "$verify/ffmpeg.exe")) {
            throw "Portable package verification failed: foxcull.exe or ffmpeg.exe is missing"
          }
      - name: Upload portable to release (Windows)
        if: matrix.platform == 'windows-latest'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const ver = '${{ needs.create-release.outputs.tag_name }}'.replace(/^v/, '');
            const name = `foxcull_${ver}_x64_portable.zip`;
            await github.rest.repos.uploadReleaseAsset({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: ${{ needs.create-release.outputs.release_id }},
              name,
              data: fs.readFileSync(name),
            });

  publish-release:
    needs: [create-release, build]
    runs-on: ubuntu-22.04
    steps:
      - name: Publish release
        uses: actions/github-script@v7
        env:
          RELEASE_ID: ${{ needs.create-release.outputs.release_id }}
          IS_PRERELEASE: ${{ needs.create-release.outputs.is_prerelease }}
        with:
          script: |
            const isPrerelease = process.env.IS_PRERELEASE === 'true';
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: process.env.RELEASE_ID,
              draft: false,
              prerelease: isPrerelease,
              make_latest: isPrerelease ? 'false' : 'true',
            });
